name: Backend CI/CD Deploy

on:
  push:
    branches:
      - main 

jobs:
  build:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.repository == 'khuswant18/E-Commerce-Devops'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug SSH Connectivity
        run: |
          echo "Testing connection..."
          nc -zv ${{ secrets.EC2_HOST }} 22 || echo "Port 22 not reachable"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }} 
          port: 22
          command_timeout: 30m
          script_stop: true
          script: |
            cd ~/E-Commerce-Devops
            git pull origin main
            cd server
            npm install
            pm2 restart ecommerce-backend || pm2 start src/index.js --name ecommerce-backend