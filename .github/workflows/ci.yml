name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  client:
    name: Client Lint/Test/Build
    runs-on: ubuntu-latest
    defaults: 
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Run unit tests
        run: npm run test

      - name: Build client
        run: npm run build

  server:
    name: Server Lint/Test/Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Run unit and integration tests
        run: npm run test

      - name: Build server
        run: npm run build
